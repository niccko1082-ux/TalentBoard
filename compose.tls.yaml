# HTTPS overlay for the public deployment. Use together with the base file:
#   docker compose -f compose.yaml -f compose.tls.yaml up -d
#
# It swaps the frontend nginx config for the TLS one, publishes 443, and mounts
# the Let's Encrypt certificates and the ACME webroot from the host.
services:
  frontend:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
