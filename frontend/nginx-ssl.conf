# TLS-enabled nginx config used for the public deployment (HTTPS via Let's Encrypt).
# Mounted over the default config by compose.tls.yaml. The certificates live on the
# host under /etc/letsencrypt and are mounted read-only into the container.

# HTTP :80 — serve the ACME renewal challenge and redirect everything else to HTTPS.
server {
    listen 80;
    server_name 54-197-72-170.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — serve the SPA and reverse-proxy the API.
server {
    listen 443 ssl;
    server_name 54-197-72-170.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/54-197-72-170.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/54-197-72-170.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
