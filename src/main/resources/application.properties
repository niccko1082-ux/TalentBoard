spring.application.name=TalentBoard

# --- Datasource (remote PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://54.197.72.170:5432/crudzaso_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crudzaso}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# The database is external and managed manually, so disable Spring Boot's
# automatic Docker Compose lifecycle management.
spring.docker.compose.enabled=false

server.port=${SERVER_PORT:8080}

app.seed.enabled=${APP_SEED_ENABLED:true}

# Comma-separated list of origins allowed to call the API from a browser (frontend).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8090,https://54-197-72-170.sslip.io}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
