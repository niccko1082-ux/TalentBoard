# Tests reuse the remote PostgreSQL database. Seeding is disabled so test runs
# do not depend on or mutate demo data, and slice tests roll back their data.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://54.197.72.170:5432/crudzaso_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crudzaso}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}

spring.jpa.hibernate.ddl-auto=update
spring.docker.compose.enabled=false
app.seed.enabled=false
